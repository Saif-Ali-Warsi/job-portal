<div class="group-item">
  <input
    type="text"
    [formControl]="searchControl"
    placeholder="Search jobs..."
  />

  <select [formControl]="locationControl">
    <option value="">All Locations</option>
    <option value="Pune">Pune</option>
    <option value="Mumbai">Mumbai</option>
    <option value="Bangalore">Bangalore</option>
  </select>

  <select [formControl]="companyControl">
    <option value="">All Companies</option>
    <option value="Google Cloud">Google Cloud</option>
    <option value="Amazon">Amazon</option>
    <option value="HCL">HCL</option>
  </select>

  <button routerLink="/jobs/create" *ngIf="isRecruiter">Create Job</button>
  <div>
    <button (click)="bulkDelete()" *ngIf="isRecruiter">Delete Selected</button>
  </div>
</div>

<ng-container *ngFor="let job of jobs">
  <div class="job-card">
    <div class="delete-input">
      <input
        *ngIf="isRecruiter"
        class="checkbox"
        type="checkbox"
        (change)="toggleSelection(job.id)"
      />

      <h2>{{ job.title }}</h2>
    </div>

    <p>{{ job.company }}</p>
    <p>{{ job.location }}</p>
    <div class="btn-group">
      <button
        class="btn-small no-padding no-border"
        [routerLink]="['/jobs', job.id]"
      >
        View Details
      </button>
      <button
        *ngIf="isRecruiter"
        class="btn-small no-padding no-border"
        [routerLink]="['/jobs', job.id, 'edit']"
      >
        Edit
      </button>
      <button
        *ngIf="isRecruiter"
        class="btn-small no-padding no-border danger"
        (click)="deleteJob(job.id)"
      >
        Delete
      </button>
    </div>
  </div>
</ng-container>

<app-empty-state *ngIf="jobs.length === 0"> </app-empty-state>
