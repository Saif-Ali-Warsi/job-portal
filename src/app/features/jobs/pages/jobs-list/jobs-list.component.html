<div class="group-item">
  <input
    type="text"
    [formControl]="searchControl"
    placeholder="Search jobs..."
  />
  <button routerLink="/jobs/create">Create Job</button>
</div>

<ng-container *ngFor="let job of jobs">
  <div class="job-card">
    <h2>{{ job.title }}</h2>
    <p>{{ job.company }}</p>
    <p>{{ job.location }}</p>
    <div class="btn-group">
      <button
        class="btn-small no-padding no-border"
        [routerLink]="['/jobs', job.id]"
      >
        View Details
      </button>
      <button
        class="btn-small no-padding no-border"
        [routerLink]="['/jobs', job.id, 'edit']"
      >
        Edit
      </button>
      <button
        class="btn-small no-padding no-border danger"
        (click)="deleteJob(job.id)"
      >
        Delete
      </button>
    </div>
  </div>
</ng-container>

<app-empty-state *ngIf="jobs.length === 0"> </app-empty-state>
