<div class="group-item">
  <input
    type="text"
    [formControl]="searchControl"
    placeholder="Search jobs..."
  />

  <select [formControl]="locationControl">
    <option value="">All Locations</option>
    <option value="Pune">Pune</option>
    <option value="Mumbai">Mumbai</option>
    <option value="Bangalore">Bangalore</option>
  </select>

  <select [formControl]="companyControl">
    <option value="">All Companies</option>
    <option value="Google">Google</option>
    <option value="Microsoft">Microsoft</option>
    <option value="Infosys">Infosys</option>
  </select>

  <button routerLink="/jobs/create">Create Job</button>
</div>

<div>
  <button (click)="bulkDelete()">Delete Selected</button>
</div>

<ng-container *ngFor="let job of jobs">
  <div class="job-card">
    <div class="checkbox">
      <input type="checkbox" (change)="toggleSelection(job.id)" />
    </div>

    <h2>{{ job.title }}</h2>
    <p>{{ job.company }}</p>
    <p>{{ job.location }}</p>
    <div class="btn-group">
      <button
        class="btn-small no-padding no-border"
        [routerLink]="['/jobs', job.id]"
      >
        View Details
      </button>
      <button
        class="btn-small no-padding no-border"
        [routerLink]="['/jobs', job.id, 'edit']"
      >
        Edit
      </button>
      <button
        class="btn-small no-padding no-border danger"
        (click)="deleteJob(job.id)"
      >
        Delete
      </button>
    </div>
  </div>
</ng-container>

<app-empty-state *ngIf="jobs.length === 0"> </app-empty-state>
