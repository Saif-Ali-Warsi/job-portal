<ng-container *ngFor="let job of jobs">
  <div class="job-card">
    <h2>{{ job.title }}</h2>
    <p>{{ job.company }}</p>
    <p>{{ job.location }}</p>
    <button
      class="btn-small no-padding no-border"
      [routerLink]="['/jobs', job.id]"
    >
      View Details
    </button>
  </div>
</ng-container>
