<div class="job-card">
  <h1>
    {{ job.title }}
  </h1>
  <p>{{ job.company }}</p>
  <p>{{ job.location }}</p>
  <p>{{ job.salary }}</p>
  <p>{{ job.description }}</p>
</div>
<div class="btn-group">
  <button (click)="applyJob()" [disabled]="alreadyApplied">
    {{ alreadyApplied ? "Already Applied" : "Apply Job" }}
  </button>
  <button (click)="saveJob()">Save Job</button>
</div>
