<div class="wrapper">
  <form [formGroup]="jobForm" (ngSubmit)="onSubmit()">
    <div class="form-field">
      <input type="text" formControlName="title" placeholder="Title" />
      <p
        class="error-message"
        *ngIf="jobForm.controls.title.touched && jobForm.controls.title.invalid"
      >
        Title is Required
      </p>
    </div>
    <div class="form-field">
      <input type="text" formControlName="company" placeholder="Company" />
      <p
        class="error-message"
        *ngIf="
          jobForm.controls.company.touched && jobForm.controls.company.invalid
        "
      >
        Company is Required
      </p>
    </div>
    <div class="form-field">
      <input type="text" formControlName="location" placeholder="Location" />
      <p
        class="error-message"
        *ngIf="
          jobForm.controls.location.touched && jobForm.controls.location.invalid
        "
      >
        Location is Required
      </p>
    </div>
    <div class="form-field">
      <input type="text" formControlName="salary" placeholder="Salary" />
      <p
        class="error-message"
        *ngIf="
          jobForm.controls.salary.touched && jobForm.controls.salary.invalid
        "
      >
        Salary is Required
      </p>
    </div>
    <div class="form-field">
      <input
        type="text"
        formControlName="description"
        placeholder="Description"
      />
      <p
        class="error-message"
        *ngIf="
          jobForm.controls.description.touched &&
          jobForm.controls.description.invalid
        "
      >
        Description is Required
      </p>
    </div>

    <button type="submit">Update Job</button>
  </form>
</div>
